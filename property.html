<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property — Elite Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page="listings" data-testid="page-property-detail">
  <div id="mountNav"></div>

  <main class="container" id="propertyMain" data-testid="property-detail-main">
    <!-- Rendered by property.js -->
  </main>

  <section class="section" style="background:var(--bg-1);border-top:1px solid var(--line)">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">You May Also Consider</span>
          <h2>Similar residences.</h2>
        </div>
      </div>
      <div class="cards-grid" id="similarGrid" data-testid="similar-grid"></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" data-testid="lightbox">
    <button class="lb-close" id="lbClose" data-testid="lightbox-close">✕</button>
    <button class="lb-prev" id="lbPrev" data-testid="lightbox-prev">&larr;</button>
    <button class="lb-next" id="lbNext" data-testid="lightbox-next">&rarr;</button>
    <img id="lbImg" alt=""/>
  </div>

  <div id="mountFooter"></div>

  <script src="common.js"></script>
  <script src="card.js"></script>
  <script src="property.js"></script>
</body>
</html>
