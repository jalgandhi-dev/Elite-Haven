<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Elite Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page="" data-testid="page-login">
  <div class="auth-shell">
    <div class="auth-art">
      <div class="quote">
        <div>
          <span class="eyebrow">Members</span>
          <h2 style="font-style:italic">The right residence is rarely advertised. It is introduced.</h2>
        </div>
        <p style="color:rgba(245,243,238,.7)">© 2026 Elite Haven · All rights reserved</p>
      </div>
    </div>

<div class="auth-page">
  <div class="auth-form-wrap">
    <div class="auth-form">

      <h1>Create your <em>account</em>.</h1>
      <p class="sub">
        Join Elite Heaven and discover exceptional residences.
      </p>

      <form class="form-grid" id="registerForm">

        <div class="field">
          <label>Full Name</label>
          <input
            required
            type="text"
            name="name"
            placeholder="John Doe"
          >
        </div>

        <div class="field">
          <label>Email</label>
          <input
            required
            type="email"
            name="email"
            placeholder="you@example.com"
          >
        </div>

        <div class="field">
          <label>Password</label>
          <input
            required
            type="password"
            name="password"
            placeholder="••••••••"
          >
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input
            required
            type="password"
            name="confirmPassword"
            placeholder="••••••••"
          >
        </div>

        <button
          class="btn btn--solid btn--lg btn--block"
          type="submit"
        >
          Create Account
          <span class="arrow">&rarr;</span>
        </button>

      </form>

      <div class="auth-foot">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>
</div>

<script src="common.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = e.target.name.value.trim();
  const email = e.target.email.value.trim();
  const password = e.target.password.value.trim();
  const confirmPassword = e.target.confirmPassword.value.trim();

  if (password !== confirmPassword) {
    window.EH.toast("Passwords do not match.");
    return;
  }

  try {
    // Get all existing users
    const usersResponse = await fetch("http://elite-haven.onrender.com/users");
    const users = await usersResponse.json();

    // Check if email already exists
    const existingUser = users.find(
      user => user.email.toLowerCase() === email.toLowerCase()
    );

    if (existingUser) {
      window.EH.toast("Email already registered.");
      return;
    }

    // Generate auto-increment ID
    const newUser = {
      id: users.length
        ? Math.max(...users.map(u => Number(u.id) || 0)) + 1
        : 1,
      name,
      email,
      password,
      role: "user",
      createdAt: new Date().toISOString()
    };

    // Save user
    const response = await fetch("http://elite-haven.onrender.com/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(newUser)
    });

    if (!response.ok) {
      throw new Error("Failed to save user");
    }

    window.EH.toast("Registration successful.");

    window.location.href = "login.html";

  } catch (error) {
    console.error(error);
    window.EH.toast("Could not connect to JSON Server.");
  }
});
</script>
</body>
</html>
