<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Haven — Saved Properties</title>
  <meta name="description" content="View the properties you have saved for later review." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page="saved" data-testid="page-saved">
  <div id="mountNav"></div>

  <main class="section" style="padding-top:80px;">
    <div class="container">
      <div class="section-head reveal">
        <div>
          <span class="eyebrow">Saved</span>
          <h1>Your selected residences.</h1>
        </div>
        <p class="subtitle">Save properties now and return later to compare your favorites.</p>
      </div>

      <div id="savedGrid" class="cards-grid"></div>
      <div id="savedFallback" class="text-center" style="margin-top:40px;"></div>
    </div>
  </main>

  <div id="mountFooter"></div>
  <script src="common.js"></script>
  <script src="card.js"></script>
  <script>
    async function renderSaved() {
        await window.EH.Wishlist.refresh();
        const savedIds = new Set(window.EH.Wishlist.all().map(String));
        const data = await window.EH.loadAllProperties();
        const saved = data.filter(p => Array.from(savedIds).some(id => window.EH.matchesPropertyId(p, id)));
      
      const grid = document.getElementById('savedGrid');
      const fallback = document.getElementById('savedFallback');
      if (!saved.length) {
        grid.innerHTML = '';
        fallback.innerHTML = '<p class="subtitle">No saved properties yet. Visit the Properties page to add homes to your collection.</p><a href="listings.html" class="btn btn--solid btn--lg">Browse Properties</a>';
        return;
      }
      grid.innerHTML = saved.map(window.EH.renderCard).join('');
      fallback.innerHTML = '';
      try { window.EH.updatePrices(); } catch (e) { /* ignore */ }
    }

    async function renderSavedWithAnimation() {
      await renderSaved();
      // Set up reveal animation for saved cards
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll("#savedGrid .reveal").forEach(el => io.observe(el));
    }

    renderSavedWithAnimation();
  </script>
</body>
</html>
