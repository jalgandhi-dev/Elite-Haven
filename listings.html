<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Properties — Elite Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page="listings" data-testid="page-listings">
  <div id="mountNav"></div>

  <main class="container listings-shell">
    <span class="eyebrow">The Collection</span>
    <h1>Curated <em>properties</em>.</h1>
    <p class="muted" style="max-width:640px;margin-bottom:36px">Filter by location, type, budget and amenities. Every property is personally inspected before it appears here.</p>

    <div class="filters" data-testid="filter-bar">
      <div class="field"><label>Country</label>
        <select id="fCountry" data-testid="filter-country">
          <option value="">All Countries</option>
          <option>India</option><option>USA</option><option>UK</option>
          <option>Australia</option><option>France</option>
        </select>
      </div>
      <div class="field"><label>Location</label>
        <select id="fSearch" data-testid="filter-search">
          <option value="">Select City</option>
        </select>
      </div>
      <div class="field"><label>Type</label>
        <select id="fType" data-testid="filter-type">
          <option value="">Any</option>
          <option>Villa</option><option>Penthouse</option><option>Apartment</option>
          <option>Estate</option><option>Chalet</option><option>Loft</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="fStatus" data-testid="filter-status">
          <option value="">All</option>
          <option>For Sale</option><option>For Rent</option>
        </select>
      </div>
      <div class="field"><label>Min BHK</label>
        <select id="fBhk" data-testid="filter-bhk">
          <option value="">Any</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        </select>
      </div>
      <div class="field"><label>Budget</label>
        <select id="fBudget" data-testid="filter-budget">
          <option value="">Any</option>
          <option value="10000000-50000000">1cr – 5cr</option>
          <option value="50000000-100000000">5cr – 10cr</option>
          <option value="100000000-200000000">10cr – 20cr</option>
          <option value="200000000-500000000">20cr – 50cr</option>
          <option value="500000000-9999999999">50cr+</option>
        </select>
      </div>
    </div>

    <div class="listings-toolbar">
      <div class="count" data-testid="results-count"><strong id="resCount">0</strong> residences match your brief</div>
      <div style="display:flex;gap:16px;align-items:center">
        <div class="field" style="display:flex;align-items:center;gap:8px">
          <label style="margin:0;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)">Sort</label>
          <select id="fSort" style="background:var(--bg-1);border:1px solid var(--line);color:var(--white);padding:8px 12px;font-family:var(--ff-body);font-size:13px" data-testid="filter-sort">
            <option value="recommended">Recommended</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="area-desc">Area: Largest</option>
          </select>
        </div>
      </div>
    </div>

    <div class="cards-grid" id="listingsGrid" data-testid="listings-grid"></div>
    <div id="emptyState" style="display:none;padding:80px 0;text-align:center;color:var(--muted)" data-testid="empty-state">
      <h3 style="color:var(--gold)">No matches</h3>
      <p>Refine your filters, or contact an advisor for off-market introductions.</p>
      <a href="contact.html" class="btn">Speak with an Advisor</a>
    </div>
  </main>

  <div id="mountFooter"></div>

  <script src="common.js"></script>
  <script src="card.js"></script>
  <script src="listings.js"></script>
</body>
</html>
