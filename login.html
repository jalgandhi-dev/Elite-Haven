<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Elite Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page="" data-testid="page-login">
  <div class="auth-shell">
    <div class="auth-art">
      <div class="quote">
        <div>
          <span class="eyebrow">Members</span>
          <h2 style="font-style:italic">The right residence is rarely advertised. It is introduced.</h2>
        </div>
        <p style="color:rgba(245,243,238,.7)">© 2026 Elite Haven · All rights reserved</p>
      </div>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-form">
        <h1>Welcome <em>back</em>.</h1>
        <p class="sub">Sign in to your private portfolio.</p>

        <div class="role-tabs" data-testid="role-tabs">
          <button class="active" data-role="user" data-testid="tab-user">Client</button>
          <button data-role="agent" data-testid="tab-agent">Advisor</button>
          <button data-role="admin" data-testid="tab-admin">Admin</button>
        </div>

        <form class="form-grid" id="loginForm" data-testid="login-form" autocomplete="off" novalidate>
          <input type="text" name="fakeusernameremembered" id="fakeUsername" autocomplete="username" style="display:none" />
          <input type="password" name="fakepasswordremembered" id="fakePassword" autocomplete="current-password" style="display:none" />
          <div class="field"><label>Email</label><input required type="email" name="email" placeholder="you@example.com" value="" autocomplete="off" data-testid="login-email"/></div>
          <div class="field"><label>Password</label><input required type="password" name="password" placeholder="••••••••" value="" autocomplete="new-password" data-testid="login-password"/></div>
          <button class="btn btn--solid btn--lg btn--block" type="submit" data-testid="login-submit">Sign In <span class="arrow">&rarr;</span></button>
        </form>
        <div class="auth-foot">
          New client? <a href="register.html" data-testid="signup-link">Register</a>
          <span style="float:right"><a href="contact.html" data-testid="forgot-link">Forgot password?</a></span>
        </div>
        <div class="auth-foot" style="margin-top:12px; text-align:center;">
          <a class="btn btn--ghost btn--block" href="index.html" data-testid="home-link">Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script src="common.js"></script>

<script>
let role = "user";

// Clear form fields on page load
window.addEventListener("load", () => {
  document.getElementById("loginForm").reset();
  document.querySelector('input[name="email"]').value = "";
  document.querySelector('input[name="password"]').value = "";
});

// Role tab switching
document.querySelectorAll(".role-tabs button").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".role-tabs button")
      .forEach(btn => btn.classList.remove("active"));

    button.classList.add("active");
    role = button.dataset.role;
    
    // Clear form fields when switching roles
    document.getElementById("loginForm").reset();
    document.querySelector('input[name="email"]').value = "";
    document.querySelector('input[name="password"]').value = "";
  });
});

// Login
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = e.target.email.value.trim();
  const password = e.target.password.value.trim();

  try {
    // Fetch users from JSON Server
    const response = await fetch("http://localhost:3000/users");

    if (!response.ok) {
      throw new Error("Failed to fetch users");
    }

    const users = await response.json();    

    // Find matching user
    const user = users.find(
      u =>
        u.email.toLowerCase() === email.toLowerCase() &&
        u.password === password &&
        u.role === role
    );

    if (!user) {
      window.EH.toast("Invalid email, password, or role.");
      return;
    }

    // Save session
    window.EH.setSession({
      id: user.id,
      name: user.name,
      email: user.email,
      role: user.role,
      loggedAt: new Date().toISOString()
    });

    window.EH.toast(`Welcome ${user.name}!`);

    switch (user.role) {
      case "admin":
        window.location.href = "dashboard-admin.html";
        break;

      case "agent":
        window.location.href = "dashboard-agent.html";
        break;

      default:
        window.location.href = "dashboard-user.html";
    }

  } catch (error) {
    console.error(error);
    window.EH.toast("Unable to connect to server.");
  }
});
</script>
</body>
</html>
